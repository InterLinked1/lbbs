; Asterisk extensions.conf

[globals]
callcount=0

[modem-outdial]
exten => 123,1,MSet(CALLERID(num)=123,CALLERID(name)=Modem)
	same => n,NoOp(${BBS_TAP_IXO_OUTGOING})
	; for some reason, calling Softmodem directly in the test doesn't work here, we need to use a 2nd Local channel
	; (though it doesn't need local channel optimization, i.e. /n)
	same => n,Dial(Local/s@modem-incoming)

[modem-incoming]
exten => s,1,Answer()
	same => n,NoOp(${BBS_TAP_IXO_OUTGOING})
	same => n,Softmodem(127.0.0.1,4827,v(Bell103)led(7))
	same => n,Hangup()
exten => h,1,Set(GLOBAL(callcount)=$[${callcount}+1])
	; For some reason, it doesn't work if we bridge directly, but it does via a ConfBridge (which provides constant timing to all channels)
	;same => n,ExecIf($[${callcount}=2]?Originate(Local/s@tmp-send/n,exten,tmp-receive,s,1,,a))
	same => n,ExecIf($[${callcount}=2]?Originate(Local/s@tmp-send/n,exten,confbridge,s,1,,a))
	same => n,ExecIf($[${callcount}=2]?Originate(Local/s@tmp-receive/n,exten,confbridge,s,1,,a))

[tmp-send]
exten => s,1,Answer()
	same => n,MSet(CALLERID(num)=124,CALLERID(name)=Modem)
	same => n,Wait(1)
	same => n,TddRx(b(1)) ; enable TDD tx/rx for channel
	same => n,Wait(3)
	same => n,TddTx(5551202 This is a test message sent by TDD\n)
	same => n,TddWait()
	same => n,ConfKick(1) ; end the conference now to kick the TMP connection from the BBS, to allow it to shut down gracefully now
	same => n,Hangup()

[tmp-receive]
exten => s,1,Answer()
	same => n,Softmodem(127.0.0.1,4545,v(baudot45)l)
	same => n,Hangup()

[confbridge]
exten => s,1,Answer()
	same => n,Set(CONFBRIDGE(user,quiet)=1)
	same => n,ConfBridge(1)
