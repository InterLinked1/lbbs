[general]
newsdir=/tmp/test_lbbs/newsdir

[nntps]
enabled=no

[articles]
maxacceptage=18250 ; in 2076, this will either need to be increased, or NNTP_TEST_DATE_HEADER will need to be updated to a more recent date

[peers]
requiretls=no

[readers]
checkidentity = no

[mainacl]
type = acl
users = test*,!test*3,unauthorized* ; match testuser and testuser2, but not testuser3
read = misc.*
post = misc.*,!*.restricted ; don't allow posting to misc.restricted
minreadpriv = 1
minpostpriv = 1

[guestacl]
type = acl
guests = 127.0.0.1/32
read = misc.test ; allow unauthenticated users to read posts in misc.test, but not post there, or anything else

[guestacl2] ; dummy entry so that we have a guest that IS authorized to post, which will NOT require guests to login to issue "POST"
type = acl
guests = 127.0.0.0/32
read = doesnt.matter ; nonexistent, just has to be non-empty
post = doesnt.matter ; nonexistent, just has to be non-empty
