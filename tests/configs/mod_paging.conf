; mod_paging.conf - Paging routing

[general]
externalcmd = /usr/bin/false "${PAGENUMBER}" "${PAGESUBJECT}" "${PAGEMESSAGE}"
maxlength = 256

[gateways]

[delegations]
5551001 = testuser
5551002 = testuser2
5551003 = testuser2
5551098 = testuser
5551099 = testuser
5551103 = testuser3
5551201 = testuser
5551202 = testuser2
5553001 = testuser ; numeric paging only
5553002 = testuser ; numeric paging only
testuseralias = testuser ; non-numeric alias

[aliases]
5551011:1234 = 5551001
5551012:1234 = 5551002
5551013:1234 = 5551003
* = 5551099
