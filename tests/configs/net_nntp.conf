[general]
newsdir=/tmp/test_lbbs/newsdir
newsname=news.example.com
newsorg=Society of BBS Sysops

[nntps]
enabled=no

[motd]
motd = This is a sample message of the day
motd = that happens to be multiline.

[subscriptions]
misc.test = yes

[distributions]
local = Local to this news server.
nonexistent = A nonexistent distribution (sort of)

[distrib.pats]
5:local.*:nonexistent = yes
10:local.*:local = yes ; This one should always get selected (it has a higher weight for identical wildmat)
16:*cross*:cp3 = yes
20:misc.cross*:cp4 = yes
18:misc.crosspos*:cp5 = yes

[moderators]
unused.* = test%%addr@bbs.example.com ; to test %% escaping
* = news%invalid@bbs.example.com ; this should be rejected by the config parser and unused...
* = newsmoderator+%s@bbs.example.com ; ... so this will get used instead.

[articles]
maxacceptage=18250 ; in 2076, this will either need to be increased, or NNTP_TEST_DATE_HEADER will need to be updated to a more recent date
poisongroups=*.poison
poisonsites=verybadsite

[kill]
From = *killedsender@example*
Organization = *Blocked Org

[peers]
requiretls=no
keepjunk=yes

[readers]
postingaccount=obfuscate
postinghost=yes
complaints=newsmaster@news.example.com

[mainacl]
type = acl
users = test*,!test*3,unauthorized* ; match testuser and testuser2, but not testuser3
read = misc.*,test.*,feed.*,!junk,!control,!control.*
post = misc.*,test.*,feed.*,!*.restricted ; don't allow posting to misc.restricted
minreadpriv = 1
minpostpriv = 1
minapprovepriv = 2 ; can't approve posts since we only have priv 1

[guestacl]
type = acl
guests = 127.0.0.1/32
read = misc.test ; allow unauthenticated users to read posts in misc.test, but not post there, or anything else

[incoming]
127.0.0.1/32 = misc.*,!misc.restricted,test.*,feed.*,local.*/!dist1b,!rejdist ; accept all distributions except dist1b and rejdist

[outgoing] ; we don't use news.example.com or the sites would get excluded by Path:
loopback1/news1.example.com = feed.*,,!feed.foo,@*.poison/!dist1c:Ap,Tn:,C,:nntp://127.0.0.1:433 ; intentionally includes stray commas to test parsing robustness
loopback2/news1.example.com = feed.*,,!feed.foo,@*.poison/dist1a:Ap,Tn::nntp://192.0.2.1:433 ; nonexistent host (reserved IP range), articles will only be backlogged
loopback3/news1.example.com = feed.*,!feed.foo,@*.poison/post:Ap,Tn:M,P:nntp://testuser:P@ssw0rd@127.0.0.1:119 ; feed using a reader connection to ourself (should still get rejected due to Message-ID)
queueonly/news1.example.com = feed.*,!feed.foo,@*.poison/dist1a:Ap,Tn:Q:nntp://127.0.0.1:433 ; queue articles only for this site
queueflush/news1.example.com = feed.*,!feed.foo,@*.poison/dist1a:Ap,Tn:Q:nntp://127.0.0.1:433 ; queue articles initially, then flush them later
