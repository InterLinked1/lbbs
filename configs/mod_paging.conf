; mod_paging.conf - Paging routing

;[general]
; Optional system command to run for all pages (once per recipient per page)
; Return 0 if page sent successfully or the appropriate error code in paging.h
; Note that returning 0 will indicate successful delivery, even if all a user's
; delivery methods failed. If you just want a "carbon copy" of all pages on the
; system but don't want to influence the delivery result here, always return nonzero.
; PAGENUMBER = pager ID, PAGESUBJECT = subject if present, PAGEMESSAGE = message if present
;externalcmd = /home/bbs/pagehandler.sh "${PAGENUMBER}" "${PAGESUBJECT}" "${PAGEMESSAGE}"
;
; Maximum length of messages to accept, from any paging protocol
; Individual protocols (e.g. TAP/IXO) may have their own limitations configured in the relevant config.
; Here, you may want to keep in mind limitations imposed by nationwide pager carriers like Spok:
;
; Spok message length limits from experimental validation (longer messages are always accepted and silently truncated)
;  Online: 240 char max (per form limitation)
;  Email: ~496 char max (including "Sender <CR> Subject - " + body).
;  SNPP: ~498 char max.
;  TAP/IXO: ~251 char max.
;
;maxmsglen = 512 ; Max message length, in bytes (0 to disable)

;[email]
;requireplaintext=yes ; Whether to require that pages received via the email-to-pager gateway have a text/plain Content-Type.
                      ; Default is yes, given that gatewaying non plain-text messages to pagers rarely makes sense. If set to no, a MIME parser will be used to extract the plain text part.

; -- Which protocol(s) should I use? --
;
; There are three major protocols widely supported by commercial paging carriers for receiving alphanumeric pages,
; and this software (although this software also lets you redirect pages to IRC and external programs).
; This software supports receiving and sending pages via all 3 methods, including
; receiving pages by one method and forwarding them on by another.
;
; SMTP: Simple Mail Transfer Protocol, the email protocol you already know and love.
; SNPP: Simple Network Paging Protocol, a variant of SMTP specifically for paging. It is
;   slightly faster, less likely to have content filtering (Spok seems to silently drop certain
;   pages submitted via SMTP with certain content), and is theoretically very feature-rich.
;   However, your commercial paging provider's SNPP implementation is likely fairly lackluster
;   (and many of SNPP's unique features specifically target 2-way pagers, which are not common).
;   At the same time, SNPP is easy to use; very easy to test/use with Telnet, more so than SMTP.
; TAP/IXO: Telocator Alphanumeric Protocol: A 300 baud telephone line based protocol, standardized in the 1990s.
;   This requires the TAP terminal phone number of your provider (see below for Spok's)/
;   This method is quite slow and requires a reliable phone line, but is useful for sites without a WAN connection.
;   Also, see above note on message length limitations.
;   There are specific devices that exist that act as TAP clients, such as the Motorola AlphaMate devices,
;   which are capable of directly submitting pages to a TAP terminal by phone.
;
; (Another method you may be familiar with is simply dialing the pager number itself and
;  providing a numeric message using DTMF tones. This is a more limited method,
;  generally for consumers to use; the 3 aforementioned protocols cater to server-to-server
;  or business-to-provider use cases. You can implement your own "paging frontend" access number (e.g. using Asterisk)
;  for users that and have it talk to a paging server using one of the three aforementioned protocols,
;  but the details and mechanics for this are out of scope of the BBS's paging functionality.
;
; There are some protocol constraints to be aware of. TAP/IXO operates over telephone lines,
; while SMTP and SNPP operate over TCP/IP networks. TAP/IXO works reasonably well over quality
; telephone lines but you may encounter issues with poor-quality VoIP connections. TAP/IXO
; is also the slowest of the three protocols (it operates at 300 baud).
;
; SNPP is the most feature-rich of the three for paging purposes, and is slightly faster than SMTP,
; but does not officially support TLS encryption (the SNPP client/server implementations here do,
; but commercial paging providers don't support it, so if encrypted delivery is required to a
; commercial paging provider, you may still want to use SMTP, or even TAP/IXO).
;
; While SNPP is theoretically the most feature-rich, the SNPP implementations of major commercial
; paging carriers like Spok are quite limited. An optimal balance of security and functionality
; and speed may therefore be to use SNPP between paging clients and servers that you control
; (such as two instances of this software), and use SMTP for final delivery to a commercial paging carrier,
; and in both cases falling back to TAP/IXO for hosts without a broadband connection.



; This section defines paging endpoints that maps pager IDs to external paging systems.
; POCSAG is not directly supported, so for delivery to a real pager, you need to forward
; a received message on to a "real" commercial paging provider (or send to your own POCSAG terminal using externalcmd).
; Unfortunately, there is no way to automatically determine routing information
; for pagers on the PSTN - you need to know the paging provider, and their SNPP/SMTP/TAP gateways.
; Format: comma-separated SNPP server, email address, and TAP/IXO terminal telephone number for paging deliveries.
; - SNPP (1st choice) - format is [<SNPP pager number>[:<password>]@]<SNPP gateway>
; - SMTP (2nd choice) - format is [<pager email user>]@<pager email domain>
; - TAP/IXO (3rd choice) - format is [<pager number>@]<TAP paging terminal number>
; All methods are optional, individually, though at least one is required for delivery.
; Incoming pages to these numbers will be relayed by the first available method that succeeds.
;
;[gateways]
; 2125552368 = 2125552368:1234@snpp.usamobility.net,3115552368@usamobility.net,2125552368@18009464644 ; explicitly specify user part/password
; 2125552369 = snpp.usamobility.net,usamobility.net,18009464644 ; shorter syntax, which uses the phone number as the user part
; 2125552370 = snpp.usamobility.net,usamobility.net,18009464644
; 2125552371:1234 = 2125553000@snpp.usamobility.net,2125553000@usamobility.net,2125553000@18009464644 ; forward to a different number and require PIN "1234"
;
; Default rule. This should only be used if delivering all pages for any numbers without
;   any other match in this file to this destination, i.e. if you have a secondary site
;   that sends all pages to a "main" site for processing, where it delivers to the right provider.
;   If you don't have the need to do this, don't use this option.
;   In some sense, this enables an "open paging relay" as anyone can submit pages
;   that would get forwarded to this gateway for processing. Use caution if exposing to the Internet.
; * = snpp.example.com,example.com,18005551212


; This section delgates pager IDs to specific users on the BBS.
; Users can manage their user paging configuration in their respective ~/.config/.paging
; (such as to configure how pages to their numbers are delivered).
;[delegations]
; 3115552368 = jsmith
; 3115552369 = paul
; paulsmith = paul ; this demonstrates that while pager IDs are conventionally numbers, they can be other alphanumeric strings as well

; This section defines "aliases" for pager IDs. Aliases can map to delegated numbers or gateway numbers.
; This can be done to "alias" a paging front-end number to the backend "real" paging number.
; The pager type for an alias is based on the superset of capabilities supported by its targets,
; i.e. if it points to all numeric pagers, it will be numeric, but if it includes one alphanumeric pager, it will have type alphanumeric.
;[aliases]
; 5552000 = 2125552368 ; allows pages sent to 555-2000, to be delivered to 212-555-2368.
; 5553000 = 2125552368 ; also alias this number to the same external recipient
; 5553500 = 2125552369
; 5553600 = 2125552368,2125552369 ; paging group with multiple recipients
; 5553669:1234 = 3115552369 ; require PIN "1234" to page to this alias
; * = 2125552370 ; "Catch-all" paging recipient. Equivalent to a catch-all mailbox in email.


; =============================================================================
; User paging configuration files are in each user's home directory at ~/.config/.paging
