; net_nntp.conf - Network News Transfer Protocol server

[general]
newsdir=/home/bbs/newsgroups ; Directory containing news groups. Each subdirectory of this directory is the name of a newsgroup.
							 ; Do NOT manually create directories for newsgroups, as group metadata is kept in several files; instead:
							 ; - For creation of new groups in the news hierarchy, use the "news newgroup" CLI command.
							 ; Because of the size of large news hierarchy, metadata is normally not kept in memory, but in special files. The files are:
							 ; $NEWSDIR/active - the active group list, used to respond to LIST ACTIVE
							 ; $NEWSDIR/active_times - used to respond to LIST ACTIVE.TIMES
							 ; $NEWSDIR/newsgroups - used to respond to LIST NEWSGROUPS
							 ; Renaming groups is not supported. To delete a group, delete the directory containing its articles and adjust any wildmats to ensure the group is not created again.
							 ; The next time the active file is rewritten, it will no longer contain the deleted group.
							 ; However, it may linger in other metadata files, which will need to be manually edited if desired to remove the deleted group.
;newsname=news.example.com   ; Set a custom hostname for the NNTP server (this news site). This is used as the site name (e.g. for Path, Xref). Defaults to BBS hostname.
;newsorg=Test Org            ; Optionally used to set the value of the 'Organization' header for injected articles.

[nntp]
enabled=yes
port=119

[nntps]
enabled=yes
port=563

[nnsp]
enabled=yes
port=433

[motd] ; Message of the Day for the LIST MOTD response. Can be used to provide notifications to users (e.g. upcoming downtime, new facilities available, etc.)
;motd = Sample "message of the day". Any text here will be returned to newsreaders when they issue the LIST MOTD command.
;motd = You can specify multiple entries to craft a multi-line message (though individual lines cannot be empty since empty config values are not allowed).

[subscriptions] ; Recommended newsgroups to advertise in the LIST SUBSCRIPTIONS response (typically general groups or groups for new users, e.g. testing, support, announcements, FAQs, etc.)
                ; Only groups actually carried by this server SHOULD be included here.
;local.welcome = yes
;local.test = yes
;news.newusers.questions = yes
;news.announce.newusers = yes

[distributions] ; Distributions list (name and description of each distribution on this new server)
local = Local to this news server.

[distrib.pats] ; List of values for DISTRIB.PATS (see RFC 3977 7.6.5 and RFC 1036 2.2.7). Colon-separated, weight:wildmat:value
               ; How do these values get used? First, this list is filtered to those with wildmats that match a newsgroup's name.
               ; From there, the highest-weight match is selected (with 0 being the lowest; the first match is used if the weight ties). The value is then used to construct the Distribution header.
               ; The value can contain multiple distributions. Note that only the best match is chosen across all newsgroups to which an article is addressed.
               ; The right hand side of the setting (e.g. 'yes') is ignored.
10:local.*:local = yes

[moderators] ; Moderators for moderated newsgroups. The order is important: the entry with the first matching wildmat will be used (so put your catch-all at the end).
; %s represents the name of the newsgroup, with '.' changed to '-'. Replace literal '%s' with '%' with '%%'
; local.* = %s@news.example.com ; Email address to which to send moderated posts for the local hierarchy (e.g. local.foo -> local-foo@news.example.com)
; See also: https://github.com/InterNetNews/inn/blob/main/samples/moderators
* = %s@moderators.isc.org ; This is the 'default' entry for moderated public Usenet groups. Leave this at the end and do not remove unless this news server is not connected to Usenet.

[articles] ; Global settings that apply to all article processing (acceptance from both readers and peers alike)
maxacceptage=10              ; Articles older than this many days will be rejected (allowing the history file to forget entries after a while, rather than growing unbounded). Default is 10, minimum is 3.
                             ; This is equivalent to the 'artcutoff' setting in INN.
minhistory=11                ; Minimum number of days to keep history records for articles, regardless of whether they are present in the spool. If 0, expired articles are immediately removed from history.
                             ; Best practice is to set this to maxacceptage+1, so that expired articles are not accepted again (if they were expired during a time where they could be accepted again).
                             ; Since maxacceptage defaults to 10, this should usually be set to 11. Similar to INN's 'remember' setting in expire.ctl
maxsize=100000               ; Absolute max article size, in bytes. Default is 100000 (~100 KB). Should be at least as large as maxpostsize in [readers].
maxgroups=100                ; Absolute max number of groups for an article. Applies to local groups authorized for a sender. Should be at least as large as maxpostgroups in [readers].
;maxcrossposts=100           ; Absolute max number of groups that may appear in the Newsgroups or Xref header. 'maxgroups' doesn't need to be any larger than this value. Default is 10.
;minlines = 3                ; Reject articles with fewer than this many lines. Default is no limit.
;maxlines = 500              ; Reject articles with more than this many lines. Default is no limit.
;poisongroups=alt.binaries.*,alt.bainaries.* ; wildmat of "poison" groups - articles crossposted to any matching groups will are "poisoned" and will be rejected
;poisonsites=verybadsite     ; wildmat of "poison" sites - articles with any of these sites in the path are "poisoned" and will be rejected. Use all-lowercase.
;spoolcompression=no         ; Whether to compress articles in the spool to reduce disk space, at the expense of CPU, ability to grep through the spool, etc. Default is no.
                             ; New articles will be compressed using zstd if it would reduce their size on disk. Existing articles can be compressed manually using the zstd command line tool.

[kill] ; Kill patterns (used to reject otherwise matching articles). Similar to a kill file, be used to reject articles from known spammers, etc. One entry per pattern.
; The headers Subject, From, References, and Xref can be used for early rejections.
; The Organization, Distribution, and Injection-Info headers can also be used to reject articles.
; Do not use the Newsgroups header (use poisongroups instead) or Path header (use poisonsites instead) here.
;From = *@annoying.invalid
;Subject = *crypto*
;Path = *badsite*

[peers]        ; Global settings for accepting articles from peers
keepjunk=yes ; Whether to file articles received from peers in 'junk' if no valid newsgroups are contained (similar to status 'j', but for groups not in the active file).
             ; If disabled, articles without any known groups are discarded. Default is no. Note that the peer still has to satisfy the wildmat of groups for which articles are accepted.
;xrefslave=no ; Whether to use the upstream server's article numbers from the Xref header instead of assigning new ones. Useful if trying to exactly mirror the upstream. Default is no.
              ; This is controlled separately for suck feeds. DO NOT USE THIS SETTING if multiple peers could feed you the same groups.
              ; Note that if the slaved article number is below the low water mark, the article will be refused; adjust the expiration settings appropriately to ensure the low water mark
              ; does not exceed any future slaved article numbers that might need to be assigned in the future.

[tls] ; Control what peers are required to use TLS to send us articles (or exempted from having to use TLS to send us articles). (Outgoing TLS setup is configured peer feed in [outgoing].)
; Typical scenarios are either not requiring TLS generally but requiring it for certain peers that carry sensitive private (non-Usenet) groups, or requiring generally but not for certain local peers.
; Unfortunately, this cannot be set only for certain hierarchies, it is per peer, so if you have peers sending you sensitive articles, require TLS for all articles you receive from them.
; Rules are evaluated from top to bottom, the first match wins. If no rules are provided, TLS is not required.
; 10.1.1.0/24 = no ; don't require TLS
; * = yes ; Require all other peers to use TLS to send us articles

[feeding] ; Global settings for feeding articles to peers
feedtimeout = 300 ; Controls how long outgoing feeding connections are left idle in case there are more articles to feed.
                  ; This avoids having to initialize the outgoing connection each time, useful for frequently fed peers. Default is 300 (5 minutes). 0 disables idling to wait for more articles.
feedretries = 5   ; Controls how many times to reattempt connection, with exponential backoff, on failure.
                  ; 0 means do not retry (only attempt to delivery once), i.e. no further connection attempts will be made untl the next article is queued for the feed or the feed is manually flushed.

[readers]
requiresecurelogin=no        ; Whether users must log in using an encrypted connection (note this setting does not require login itself, only that logins be secure).
checkidentity=yes            ; Whether the "From" header of user posts is validated. Some news providers don't care but you may wish to enforce validity. Default is yes.
                             ; When enabled, users must use an email address assigned to them on this server. 'allowinvalid' can also be enabled to allow more flexibility.
allowinvalid=yes             ; If checkidentity is enabled, whether to additionally allow addresses ending in ".invalid", per RFC 5537. Default is no.
                             ; If enabled, authenticated users must posts with an assigned email address or a .invalid address; guests may only post with .invalid addresses, if allowed to post at all.
maxpostsize=10000            ; Maximum article size accepted from readers, in bytes. Default is 10000 (~10 KB). Should be no larger than maxsize.
maxpostgroups=20             ; Maximum number of newsgroups an article may have. Only applies to posts from readers. Should be no larger than maxgroups.
;postingaccount=yes          ; Whether to include the 'posting-account' parameter in the Injection-Info header.
                             ; Options are 'yes' (include poster's username), 'obfuscate' (include hash of poster's username, to protect privacy while maintaining correlation), or 'no' to not include.
;postinghost=no              ; Whether to include the 'posting-host' parameter in the Injection-Info header (the hostname or IP address of the poster). Default is no as this can expose sensitive information.
;complaints=newsmaster@news.example.com ; Email address to include in Injection-Info for mail-complaints-to parameter.

; Note that many settings below are configured using a wildmat (one or more comma-separated wildmat patterns).
; Each wildmat pattern is similar to a regular expression, but simpler and different. Intuitively, * works the way you'd expect, and ! negates a match.
; A wildmat matches an expression if the rightmost matching expression is not a negative match (i.e. beginning with !)
; For example, a* matches apple, but a*,!*e does NOT match apple (but !*e,a* DOES match apple).
; The characters \, ?, [, ], and * have special meanings in wildmats. Refer to RFC 3977 Section 4 for a detailed explanation of the wildmat format.

; Additional settings to control reader access:

; Define one or more ACLs to grant granular permissions for various newsgroups (beyond the basic settings in [general]).
; If no ACLs are defined, all actions are implicitly authorized (subject to any restrictions in [general]). If any ACLs are defined, all actions are denied unless authorized by an ACL.
; Multiple ACLs are allowed and permissions are granted if ANY ACL matching a user allows the action (even if others do not)
[acl] ; The section name is not special; however, type=acl must be set.
type = acl ; Type name must be acl
;guests = 0.0.0.0/32 ; Comma-separated list of CIDR ranges for which to authorize guest access (guests are not matched by 'users'). Set 0.0.0.0/0 to match all unauthenticated users.
                     ; Note that authenticated users are never matched by this section, even if the user's IP address matches one of the ranges.
users = * ; wildmat of usernames (* to match all)
read = *,!junk,!control,!control.* ; wildmat of groups matching users are allowed to read, e.g. alt.*,comp.*. Users can filter messages shown within a group using their kill file.
post = *,!junk,!control,!control.* ; wildmat of groups matching users are allowed to post to, e.g. alt.misc.*,alt.bbs.* - should be at least as restrictive as 'read'
minreadpriv = 1 ; If greater than 0, further restrict reading to users with this privilege level (and block guests).
minpostpriv = 1 ; If greater than 0, further restrict reading to users with this privilege level (and block guests).
minapprovepriv = 2 ; Restrict Approval headers to users with this privilege level. Guests are always blocked. Minimum is 1, if set to 0, approvals will be disabled for this ACL.

; Article retention (expiration) settings. The first matching entry is used, so put your catch-all at the end!
; The format of an entry is similar to INN's expire.ctl:
; <pattern> = <min>:<default>:<max>/<flags>
; min = The minimum amount of time to retain ANY article (regardless of Expires header)
; default = The amount of time to retain articles that do NOT contain an Expires header
; max = The maximum amount of time to retain ANY article (regardless of Expires header)
; Decimal values may be specified for any of the above 3 values for fractions of a day.
; flags = Optional flags (reserved). Currently, no flags are supported.
; So to ignore the Expires header, you would set these all the same. To perfectly honor Expires, you'd set min to 0 and max to never.
; The arrival time of an article is used for expiration, not the article's Date.
; To actually expire articles, run 'rsysop "news expire"' from a cron job at a suitable interval.
[retention]
;local.* = never:never:never ; Retain articles for local.* indefinitely (ignoring Expires header)
;local.foo = 0:180:never ; Retain articles for local.foo for 180 days by default, but fully honor Expires headers
;misc.very.busy.group = 0.25:10:20 ; Generally delete articles after 10 days, and after no more than 20 days. Keep all articles for at least 6 hours.
;news.lists.filters = 3:3:3 ; Only keep automated filtering messages for 3 days
* = never:never:never ; the implicit default entry (never expire any articles). However, there SHOULD be at least one pattern matching every group (even just *) or you will see warnings.

; Advanced options to tune the history behavior
[history]
; A Bloom filter is used for checking for history existence to avoid having to traverse history for every article existence check.
; Bloom filters allow the server to efficiently confirm if an article is NOT in history without actually traversing history for each check.
; In most cases, this should greatly speed up performance and will also reduce unnecessary disk I/O.
; Certain operations use larger Bloom filters but a persistent Bloom filter is maintained in the background for ordinary usage.
; These settings adjust the behavior of the Bloom filter. The default settings should work for news servers with up to 12.5 million articles.
; Past that, you will need to increase the memory that can be used for the Bloom filter or checks will fall back to linear history scans.
;bloom_maxmem = 50 ; The maximum amount of memory to allocate for the global Bloom filter, in MB. 0 will disable the Bloom filter altogether as well as the cache of recent articles.
                   ; The default is just 50 MB, to accomodate low-resource systems with as few as 0.5 GB of RAM. (The cache for recent articles is currently a fixed 24 KB)
                   ; If your system is well-resourced, you can increase this (and doing so will probably improve performance).
                   ; In particular, the larger the history file, the larger this should be (with bloom_maxfpinv = 25,000, 21 MB are needed for every 1 million articles).
                   ; You can use the "news bloom size" CLI command to see how much space is needed depending on the number of articles and the false positive rate.
;bloom_maxfpinv = 25000 ; The maximum reciprocal false positive rate for the global Bloom filter (e.g. 25000 = 1/25,0000).
                        ; Usually just tuning bloom_maxmem is sufficient and this can probably be left alone unless you know what you are doing.

; Feed configuration:
[incoming] ; Specify other news servers that can send us articles, in peer = groups[/distributions] format. These are peers that "push" articles to us (similar to incoming.conf in INN).
          ; You can specify a local username on this server, an IPv4 address (CIDR range allowed), or a hostname (though this may incur a performance penalty).
          ; If multiple entries match a peer, any entry with a matching group/distribution pair will authorize a peer (however, this should be avoided).
		  ; The groups is a wildmat which specifies the groups to accept from this server (e.g. * for all, comp.* for just the comp hierarchy, etc.)
		  ; The distributions value can be optionally specified to restrict article acceptance to articles matching a list of explicit or explicitly negated distributions (no wildmats).
		  ; If specified, a positive match against at least one group in the Distribution header matches the article. If only negative patterns are used, any negative match results in a nonmatch.
		  ; If neither occurs, and the list here contains no negative patterns, the article does not match; if any pattern began with a !, then the article matches.
		  ;    For this last reason, it is almost definitely a mistake to have a single feed that specifies distributions that start with a ! along with some that don't.
		  ; If you have used INN before, there is no "default" feed configuration (e.g. ME) here. All the feeds and/or distributions you want (or don't want) need to be explicitly specified per feed.
          ; Hosts without static IP addresses will need an account on this server to submit articles.
          ; While this section authorizes peers to send us articles, it also implicitly allows them to read articles and perform other reader-like operations. Only use for trusted peers!
;sysop = alt.misc.*
;news.eternal-september.com = *,!junk,!control,!control.* ; accept everything accept junk and control
;127.0.0.1/32 = alt.misc.*/!4gh ; accept all articles for alt.misc.* unless they have the 4gh distribution
;nntp.example.com = alt.misc.nntp.*,local.*/4gh ; Only accept articles for alt.misc.nntp.* or local.* which ALSO have the 4gh distribution
bbs.phreaknet.org = lbbs.*

[outgoing] ; Specify outgoing feed configuration (similar to "newsfeeds" in INN), one entry per feed.
; The syntax for configuring outgoing feeds has been designed to be similar to the "newsfeeds" configuration in INN (but is not identical, and only the options listed below may be used).
; Unlike INN, which uses an external program (innfeed or innduct) to feed articles to other sites using a funnel feed, all news peering in LBBS is handled by a single process.
; Therefore, there is no need to configure another program for feeds in ordinary peering usage. The 'n' channel type is used to send articles to peers directly using NNTP from within the BBS.
; sitename[/exclude,exclude,...] = grouppat,grouppat...[/dist,dist]:flag,flag...:parameter
; sitename = Site name, which should match the site's path identity unless its hostnames are explicitly specified as exclusions. "Special" non-peer entries should end in ! to avoid matching a site inadvertently.
; exclude = Hostname exclusions, to match one or more additional path identities. Mandatory for peers if sitename is not the site's path identity.
; grouppat = One or more wildmats specifying the groups to match. @ poison entries may also be specified here to not feed articles if any poison pattern matches (even if crossposted to other valid groups).
; dist = Optional list of distributions to match or not match. The rules for distribution matches are the same as in [incoming]
; flag = Flag values (comma-separated, some of which may accept values, which should follow immediately with no spaces)
;   < size = send article only if less than this many bytes
;   > size = send articles only if greater than this many bytes
;   A checks (can specify multiple letters):
;     p = only check exclusions against the path identities, not the site name. Should be used if the site name is not the site's path identity, or for special non-peer sites.
;   W information sent to site
;     P The Path header field - NOT YET IMPLEMENTED (planned for channel/program feeds)
;   T feed type (with any allowed arguments):
;     n Simple native NNTP feed, with optional arguments (separated by :)
;         arg1: NNTP flags, from the following list, comma-separated:
;             B Batch size for TAKETHIS. No more than this many articles will be pipelined in streaming mode. Specify number after 'B' with no spaces.
;             C "CHECK first". Whether to always send CHECK before TAKETHIS to reduce wasted bandwidth usage from refused/rejected articles.
;             D Do DEFLATE compression. Will fail if not available on peer.
;             M Send MODE READER command upon connection. This may be needed if you are using the 'P' option, otherwise don't use it.
;             P Feed the article using a reader connection with POST instead of IHAVE/TAKETHIS. Certain headers will not be fed to accomodate this. This should be avoided if possible.
;               Not compatible with the B or C options.
;             Q Queue all articles for this site until they are explicitly flushed using 'news feedflush <sitename>' (usually in conjunction with a cron job to flush the feed periodically).
;               Useful for intermittently connected sites where you still want to deliver articles using NNTP instead of UUCP.
;             S Do STARTTLS encryption. Will fail if not available on peer. (Note: To do implicit TLS, specify port 433 and nntps:// as part of the host in arg2)
;         arg2: URI in format nntp[s]://[username@password]@hostname[:port] - if not specified, the first exclusion if set (site name otherwise) will be used for hostname, with port 119.
;         No W flags may be used with this feed type.

;examplenews/news.example.com = *,@*.bina*,@*.bain*,@*.dateien*,@*.pictures*,!local*,!junk/!local:Ap,Tn:B500,C,D:nntps://news.example.com:433

;[etrn] ; Unofficial ETRN extension to NNTP, useful for intermittently connected sites (or supporting them)
; As with SMTP, ETRN can be used to request articles queued in a peer's outgoing feed for us. This is a simpler alternative to sucking articles (supported) or using UUCP (not currently supported).
; Each entry denotes a peer that is allowed to flush our outgoing feed for it.
; The key is the IP address or hostname of the peer, and the value is the peer's site name(s) / path identities that are allowed for the ETRN command.
; Multiple entries can be specified as a comma-separated list for one host. The first matching host is used.
; For using ETRN in the reverse direction (requesting another peer flush its outgoing feed for us), use the "news feedflushreq" CLI command.
;news.example.com = examplenews,examplenews1

; If you don't have peering with news server(s) to send you articles, you can "suck" them from another news server using a reader account to mirror a limited number of groups and articles
; You can even set up multiple suck feeds to suck articles from multiple upstream servers.
; 1) To use suck feeds, first define a suck feed as shown below. Then, run "news suckgroups <name>" to initialize the groups that will get sucked (this needs to be done at least once).
;    This command will generate a report of the groups it has determined will be sucked in the next stage. You should inspect this report to ensure it has all the groups you want (and none you don't).
;    The report is formatted: <suck?> <name> <high> <low> <count> <status>
;    To check if all the groups you want are present, run grep "^1" /tmp/nntpsuckgroupsABC123 (subbing in the generated report's actual filename)
;    Also pay attention to the estimated article count reported when the command finishes. You may decide this is too many articles and want to refine your group selection.
;    You will probably need to do this a few times, adjusting the group filters and adjusting patterns until suitable.
;    To explicitly carry groups that are being filtered out by the group filters, add a group pattern with the groups to carry regardless, ensuring the entire expression has NO wildcards (*)
; 2) Once you are satisfied with groups in step #1, run "news suckload <name> <filename>" where <filename> is the report generated in step #1. This will also actually create any groups locally if needed.
; 3) Finally, to regularly suck articles, run "news sucknews <name>" on a regular basis (e.g. using a cron job). Requested articles are filtered according to the filters in [articles].
;    Note that 'news sucknews' may result in an illogical ordering within groups due to crossposting, see NOTE below on how to work arounds this.
;
; To fully mirror an existing news server, set xrefslave=yes, autocreate=yes and add the group pattern '* = *' (but be careful! This can be extremely resource intensive if mirroring a large news server!)
;
; NOTE: Because articles are downloaded the the first time they appear in ANY group to which an article is posted, articles crossposted to other groups will be downloaded before the group's other articles.
;  This can result in an incoherent ordering by article number that is not consistent with the original arrival dates or article numbers upstream.
;  There are two ways of dealing with this. One is to use xrefslave, which preserves ordering between groups by simply mirroring the upstream order.
;  A more advanced option is instead of running 'news sucknews', run 'news suckorder <suckfeed>', which saves only a list of articles and sorts them by the upstream Xref ordering and the Date headers.
;  Afterwards, then run 'news suckordered <suckfeed> <tmpfilename>' with the result of the previous operation, which will download articles in an order that preserves arrival order within each group.
;  (You can also do both of these simultaneously using 'news sucknewsordered <suckfeed>' which also deletes the temporary file afterwards.)
;  This is the best option if you don't want to (or can't) slave your Xref, but beware metadata for each article is stored in memory for sorting, so this may not work with a huge number of articles.
;  It will also be slower to suck articles, since pipelining can't be used as effectively due to the constant group switching that is involved.
;  Finally, for incremental updates, if you want to preserve ordering within groups, also be sure to run "news sucknewsordered <name>" in your cron job rather than "news sucknews <name>", e.g.:
;     */10 * * * * /usr/local/sbin/rsysop "news sucknewsordered suckfeed"
;  Because the ordering only applies to ensuring consistency WITHIN groups, an overall ABSOLUTE ordering is still not guaranteed, so the best way to ensure coherency is to suck frequently
;  to minimize ordering variances from the source server.
;
;[suckfeed] ; The name of your suck feed
; General settings for this suck feed:
;type = suckfeed ; Must be 'type=suckfeed' for suck feeds
;creator = sucksync ; Custom value to use for "newsgroup creator" (provided in LIST ACTIVE.TIMES response). Once a group is sucked, this cannot be changed, choose carefully! Doesn't matter that much though.
                    ; If you are sucking Usenet groups, 'usenet' is a common value for this setting.
;server = nntp://username:password@news.example.com:119 ; The server from which to suck news.
;modereader = yes ; Whether to send "MODE READER". Default is no.
;starttls = yes ; Whether to use STARTTLS. Default is no.
;compress = yes ; Whether to enable compression. Default is no.
;autocreate = yes ; Whether to automatically create groups locally if a remote group matches ANY of the group patterns below and it does not already exist. If disabled, the group must already exist locally.
                  ; You can use this to mirror an existing news hierarchy. However, be careful with this option (it may make sense to use the first time, then disable). Default is no.
;xrefslave = no ; Whether to use the upstream server's article numbers from the Xref header instead of assigning new ones. Useful if trying to exactly mirror the upstream. Default is no.
                ; This setting is independent of xrefslave in [peers], allowing you to initially slave article numbers from one server and then accept future articles from multiple peers.
;
; Group filters (used to filter the groups that will be pulled for the suck feed; these are only analyzed when "news suckgroups" is run)
;mincount = 10 ; Skip groups that have fewer than this reported article count. Useful for skipping inactive groups.
;minlow = 1000 ; Skip groups with a lower reported low water mark than this. If sucking from an established news server that's been around for a while, using a high enough value can help skip inactive groups.
;maxactivity = 30 ; Skip groups that have not been active in more than this many days. Useful for skipping inactive groups. If the most recent 9 articles have all been cancelled, group is excluded.
;
; Group patterns: the actual group wildmats to match. Groups are not matched in the first place unless they match at least one pattern and no poison patterns are matched.
;  If multiple patterns match, the first matching pattern is used, so put your catch-all (if any) at the end (and your poison matches first). To mirror everything available, simply use "* = *"
;  If group filters exclude a group from inclusion, normally such groups are not included even if they match here. To override group filters, explicitly specify the group name to include it anyways.
;   (Other patterns in the expression may contain wildcards, but the full name of the group must be spelled out explicitly to override.)
;@alt.binaries.*,@alt.bainaries.* = 0 ; never download binary newsgroups
;local.* = * ; download everything in the local hierarchy
;comp.dcom.* = * ; download all articles in groups in comp.dcom hierarchy (from groups not first filtered out by any group filters above)
;comp.*,humanities.*,misc.*,news.*,rec.*,sci.*,soc.*,talk.* = -50 ; download most recent 50 articles in any other Big 8 newsgroups (note that fewer articles may be downloaded if filters are used)
;comp.mail.headers,comp.infosystems.gemini = * ; retain these groups even if they would be filtered out by group filters
;test.foo = 1-10 ; download articles 1-10 from "test.foo" (if it isn't filtered out by group filters)
;test.foo2 = 11- ; download articles 11 and newer from "test.foo2"
;test.foo3 = 15 ; download only article 15 from "test.foo3"
